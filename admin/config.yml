backend:
  name: github
  repo: llw1989/leonlim-site
  branch: main
  base_url: https://leon-cms-auth.llw1989.workers.dev
  auth_endpoint: api/auth

# Where uploaded images get stored
media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "blog"
    label: "Blog Posts"
    folder: "blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title",           name: "title",       widget: "string" }
      - { label: "Publish Date",    name: "date",        widget: "datetime" }
      - { label: "Cover Image",     name: "image",       widget: "image", required: false }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "HDB Upgrade"
          - "Market Insights"
          - "Property Strategy"
          - "Investment Tips"
          - "Case Study"
      - { label: "Summary",         name: "summary",     widget: "text",  hint: "1–2 sentences shown on the blog listing page. Keep it under 160 characters for SEO." }
      - { label: "Body",            name: "body",        widget: "markdown" }
      - { label: "SEO Meta Title",  name: "meta_title",  widget: "string",   required: false, hint: "Leave blank to use the post title. Max 60 characters." }
      - { label: "SEO Description", name: "meta_desc",   widget: "text",     required: false, hint: "Max 155 characters. This appears in Google search results." }
